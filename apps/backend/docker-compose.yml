services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sanime
      POSTGRES_PASSWORD: sanime
      POSTGRES_DB: sanime
    ports:
      - '5432:5432'
    volumes:
      - sanime-backend-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: sanime
      MINIO_ROOT_PASSWORD: sanime-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - sanime-backend-minio:/data

volumes:
  sanime-backend-postgres:
  sanime-backend-minio:
